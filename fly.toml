app = "price-comparator"
primary_region = "sin"  # Singapore — closest to Hyderabad

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2